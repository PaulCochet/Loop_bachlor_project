<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container": "#eeeeec",
                    "secondary": "#003cdd",
                    "on-surface": "#1a1c1b",
                    "surface-variant": "#e2e3e1",
                    "surface-dim": "#dadad8",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-high": "#e8e8e6",
                    "on-tertiary-fixed": "#1b1c1c",
                    "tertiary-container": "#5c5d5d",
                    "surface-bright": "#f9f9f7",
                    "secondary-fixed-dim": "#b9c3ff",
                    "outline": "#747688",
                    "surface": "#f9f9f7",
                    "outline-variant": "#c4c5d9",
                    "surface-tint": "#5f5e5e",
                    "on-tertiary-fixed-variant": "#464747",
                    "on-primary": "#ffffff",
                    "inverse-surface": "#2f3130",
                    "on-secondary-fixed-variant": "#0033c1",
                    "on-secondary-container": "#eaebff",
                    "on-primary-fixed": "#1c1b1b",
                    "on-secondary-fixed": "#001257",
                    "primary": "#464545",
                    "tertiary-fixed-dim": "#c7c6c6",
                    "on-error-container": "#93000a",
                    "surface-container-highest": "#e2e3e1",
                    "on-surface-variant": "#434656",
                    "primary-fixed": "#e5e2e1",
                    "on-tertiary-container": "#d7d6d6",
                    "on-primary-fixed-variant": "#474646",
                    "on-background": "#1a1c1b",
                    "error-container": "#ffdad6",
                    "on-secondary": "#ffffff",
                    "inverse-on-surface": "#f1f1ef",
                    "tertiary": "#454546",
                    "background": "#f9f9f7",
                    "on-tertiary": "#ffffff",
                    "on-primary-container": "#d8d5d5",
                    "on-error": "#ffffff",
                    "primary-container": "#5e5c5c",
                    "primary-fixed-dim": "#c9c6c5",
                    "inverse-primary": "#c9c6c5",
                    "secondary-container": "#2b57ff",
                    "error": "#ba1a1a",
                    "surface-container-low": "#f4f4f2",
                    "secondary-fixed": "#dde1ff",
                    "tertiary-fixed": "#e3e2e2"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; background-color: #f9f9f7; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .display-lg-italic { font-weight: 800; font-style: italic; line-height: 1; letter-spacing: -0.04em; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center">
<!-- Screen Container: Focused Transactional (390x844 layout) -->
<main class="w-full max-w-[390px] min-h-[844px] bg-surface-container-lowest flex flex-col px-8 py-12 relative overflow-hidden">
<!-- Subtle background texture / visual anchor -->
<div class="absolute -top-20 -right-20 w-64 h-64 bg-secondary/5 rounded-full blur-3xl pointer-events-none"></div>
<!-- Header: Brand Identity -->
<header class="flex items-center gap-2 mb-16">
<div class="flex items-center">
<span class="text-on-background font-black italic tracking-tighter text-2xl uppercase">LOOP</span>
</div>
<div class="h-4 w-[1px] bg-outline-variant/30 mx-1"></div>
<div class="flex items-center gap-1.5 text-[#0D46F2] font-semibold text-sm">
<span class="material-symbols-outlined text-[18px]">build</span>
<span class="tracking-tight">Espace technicien</span>
</div>
</header>
<!-- Title Section: Editorial Voice -->
<section class="mb-12">
<h1 class="text-4xl display-lg-italic text-on-background mb-4">
                Connexion technicien
            </h1>
<p class="text-[#8C8C8C] text-sm leading-relaxed max-w-[240px]">
                Vos identifiants vous ont été fournis par Loop
            </p>
</section>
<!-- Login Form: Technical Precision -->
<form class="flex-grow flex flex-col gap-6" onsubmit="return false;">
<div class="space-y-4">
<div class="relative group">
<input class="w-full px-0 py-4 bg-transparent border-b border-outline-variant focus:border-secondary outline-none transition-all duration-300 placeholder:text-[#8C8C8C] text-on-background font-medium" id="email" placeholder="Email professionnel" type="email"/>
</div>
<div class="relative group">
<input class="w-full px-0 py-4 bg-transparent border-b border-outline-variant focus:border-secondary outline-none transition-all duration-300 placeholder:text-[#8C8C8C] text-on-background font-medium" id="password" placeholder="Mot de passe" type="password"/>
<button class="absolute right-0 top-4 text-outline-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<div class="flex items-center gap-3 mt-2">
<div class="relative flex items-center">
<input class="appearance-none h-5 w-5 rounded-md border-2 border-outline-variant checked:bg-secondary checked:border-secondary transition-all cursor-pointer" id="remember" type="checkbox"/>
<span class="material-symbols-outlined absolute text-white text-[14px] left-0.5 pointer-events-none opacity-0 peer-checked:opacity-100">check</span>
</div>
<label class="text-sm font-medium text-on-surface-variant cursor-pointer" for="remember">Rester connecté</label>
</div>
<div class="mt-8">
<button class="w-full py-5 bg-[#0A0A0A] text-surface-container-lowest rounded-xl font-bold tracking-wide active:scale-95 transition-transform duration-200 flex justify-center items-center gap-2 group">
<span>Se connecter</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
<!-- Decorative Element: Asymmetry -->
<div class="mt-12 opacity-5">
<span class="material-symbols-outlined text-[120px] absolute -bottom-10 -right-10 rotate-12" style="font-variation-settings: 'FILL' 1;">precision_manufacturing</span>
</div>
<!-- Footer Shell: Bottom Support -->
<footer class="mt-auto pt-8 flex flex-col items-start gap-1">
<p class="text-[11px] text-[#8C8C8C] font-medium tracking-wide">
                Problème de connexion ? <span class="text-secondary cursor-pointer hover:underline">Contactez Loop</span>
</p>
</footer>
</main>
<!-- Shared Bottom Nav is suppressed for transactional login screen as per instructions -->
</body></html>
