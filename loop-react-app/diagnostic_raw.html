<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "surface-bright": "#f9f9f7",
                    "on-tertiary-container": "#d7d6d6",
                    "on-tertiary-fixed": "#1b1c1c",

                    "surface-variant": "#e2e3e1",

                    "on-error-container": "#93000a",
                    "outline-variant": "#c4c5d9",
                    "inverse-surface": "#2f3130",
                    "error": "#ba1a1a",

                    "on-tertiary-fixed-variant": "#464747",

            "borderRadius": {

                    "lg": "0.25rem",

            "fontFamily": {
                    "headline": ["Manrope", "sans-serif"],
                    "body": ["Instrument Sans", "sans-serif"],
                    "label": ["Instrument Sans", "sans-serif"]
            }
          },
        },
      }

<style>
        body { font-family: 'Instrument Sans', sans-serif; }
        .font-editorial { font-family: 'Manrope', sans-serif; font-style: italic; font-weight: 800; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full flex justify-between items-center px-6 py-4 bg-[#f9f9f7]/80 dark:bg-[#1a1c1b]/80 backdrop-blur-xl z-50">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container overflow-hidden">
<img alt="Technician" class="w-full h-full object-cover" data-alt="Professional portrait of a repair technician in a clean uniform, neutral studio background, high-end photography" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB3pBpkX2yFKT1bNfq08RkHS63L38rixvm-U3pQo0qcAb7eppEoBCNJyfsFR3gziuszeLDirGKN7_-BkgYsrG7x4OaHrfAtDxSZio2rKg1nz8-hPdEGzCru18WV-7amaa8PgNjr1A7f66wTn3B1UM6m9yxLRrfbjtwDGkhc4FuhkpBeIbyjSl14w1zcySZPfVHr63aMsxvpqc-rHx3x0XfN6l4SNhWCNwamyCIuR9vKG7y5OU16X-adgE1XWggzd6wuAUAKnVRgCq8"/>
</div>
<span class="text-2xl font-black italic text-[#1a1c1b] dark:text-white uppercase tracking-widest font-headline">LOOP</span>
</div>
<button class="material-symbols-outlined text-[#464545] dark:text-[#eeeeec] hover:opacity-70 transition-opacity active:scale-95 duration-200">
            settings
        </button>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Title Section -->
<section class="mb-8">
<h1 class="text-5xl font-editorial uppercase tracking-tight text-on-background leading-none mb-2">
                Diagnostic
            </h1>
<p class="text-outline font-medium tracking-wide">
                Lave-linge Samsung
            </p>
</section>
<!-- Progress Section -->
<section class="mb-10">
<div class="w-full h-1 bg-surface-container-highest rounded-full overflow-hidden mb-3">
<div class="h-full bg-secondary w-1/2 shadow-[0_0_12px_rgba(0,60,221,0.4)]"></div>
</div>
<p class="text-sm text-outline font-medium">
                Étape 2 sur 4 — Vérification électrique
            </p>
</section>
<!-- Main Action Card -->
<section class="mb-10">
<div class="bg-surface-container-low p-8 rounded-xl">
<h2 class="text-2xl font-bold leading-tight text-on-background mb-8 max-w-xs">
                    La pompe de vidange émet-elle un bruit anormal?
                </h2>
<div class="flex gap-4">
<button class="flex-1 bg-on-background text-surface py-4 rounded-xl font-bold hover:opacity-90 active:scale-95 transition-all">
                        Oui
                    </button>
<button class="flex-1 border-2 border-on-background text-on-background py-4 rounded-xl font-bold hover:bg-on-background hover:text-surface active:scale-95 transition-all">
                        Non
                    </button>
</div>
</div>
</section>
<!-- Observations -->
<section class="mb-10">
<label class="block text-xs uppercase tracking-widest font-black text-outline mb-3">
                Observations technicien
            </label>
<textarea class="w-full bg-surface-container-low border-none rounded-xl p-4 min-h-[120px] focus:ring-2 focus:ring-secondary text-on-background placeholder:text-outline/50 transition-all" placeholder="Écrivez vos notes ici..."></textarea>
</section>
<!-- History -->
<section class="mb-12">
<h3 class="text-xs uppercase tracking-widest font-black text-outline mb-6">
                Étapes validées
            </h3>
<ul class="space-y-6">
<li class="flex items-center gap-4">
<span class="w-1.5 h-1.5 rounded-full bg-outline"></span>
<span class="text-on-surface-variant font-medium">Vérification alimentation — <span class="text-on-background font-bold">OK</span></span>
</li>
<li class="flex items-center gap-4">
<span class="w-1.5 h-1.5 rounded-full bg-outline"></span>
<span class="text-on-surface-variant font-medium">Lecture code erreur E21 — <span class="text-on-background font-bold">Pompe</span></span>
</li>
</ul>
</section>
<!-- Final CTA -->
<section class="mb-12">
<button class="w-full bg-on-background text-surface py-5 rounded-xl font-black text-lg flex justify-center items-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all">
                Continuer
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-[#f9f9f7] dark:bg-[#1a1c1b] shadow-[0px_-4px_32px_rgba(26,28,27,0.06)]">
<div class="flex flex-col items-center justify-center text-[#464545] dark:text-[#747688] opacity-60 hover:text-[#003cdd] transition-colors active:scale-90 duration-150">
<span class="material-symbols-outlined mb-1">home</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-tight">Accueil</span>
</div>
<div class="flex flex-col items-center justify-center text-[#464545] dark:text-[#747688] opacity-60 hover:text-[#003cdd] transition-colors active:scale-90 duration-150">
<span class="material-symbols-outlined mb-1">qr_code_scanner</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-tight">Scan</span>
</div>
<div class="flex flex-col items-center justify-center text-[#464545] dark:text-[#747688] opacity-60 hover:text-[#003cdd] transition-colors active:scale-90 duration-150">
<span class="material-symbols-outlined mb-1">chat_bubble</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-tight">Messages</span>
</div>
<!-- Active Tab: Diagnostic -->
<div class="flex flex-col items-center justify-center text-[#003cdd] scale-110 font-black active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined mb-1">build</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-tight">Diagnostic</span>
</div>
</nav>
</body></html>
