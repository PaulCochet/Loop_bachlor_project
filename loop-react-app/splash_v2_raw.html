<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Loop - Splash</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:ital,wght@0,400;0,700;0,800;1,700;1,800&amp;family=Instrument+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>
        body { font-family: 'Instrument Sans', sans-serif; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-background antialiased overflow-hidden">
<!-- Splash Screen Wrapper -->
<main class="relative min-h-screen flex flex-col justify-between items-center px-8 py-16">
<!-- Background Subtle Texture (The Editorial Canvas) -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(#eeeeec 1px, transparent 1px); background-size: 40px 40px;">
</div>
<!-- Spacer for Layout Balance -->
<div class="hidden md:block h-20"></div>
<!-- Center Section: Brand Identity -->
<div class="relative z-10 flex flex-col items-center justify-center text-center">
<!-- Geometric Logo Icon -->
<div class="w-24 h-24 mb-6 flex items-center justify-center bg-secondary rounded-[1.5rem] shadow-[0px_20px_40px_-12px_rgba(0,60,221,0.25)]">
<span class="material-symbols-outlined text-surface-container-lowest text-6xl" data-weight="fill">
                    all_inclusive
                </span>
</div>
<!-- Logotype -->
<h1 class="font-headline text-6xl font-extrabold italic tracking-tighter text-on-background mb-4">
                Loop
            </h1>
<!-- Tagline -->
<p class="text-outline text-lg max-w-[280px] leading-relaxed font-medium">
                Donnez une seconde vie à vos appareils
            </p>
</div>
<!-- Bottom Section: Actions -->
<div class="relative z-10 w-full max-w-sm space-y-4 mt-auto md:mt-24">
<!-- Primary Action -->
<button class="w-full h-16 bg-on-background text-surface-container-lowest font-semibold text-base rounded-xl transition-transform active:scale-[0.98] flex items-center justify-center shadow-lg">
                Créer un compte
            </button>
<!-- Secondary Action -->
<button class="w-full h-16 bg-transparent border-2 border-on-background text-on-background font-semibold text-base rounded-xl transition-all hover:bg-surface-container-low active:scale-[0.98] flex items-center justify-center">
                Se connecter
            </button>
<!-- Tertiary Action -->
<div class="pt-4 flex justify-center">
<a class="inline-flex items-center gap-2 text-outline text-sm font-medium hover:text-on-background transition-colors group" href="#">
                    Accès technicien
                    <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">
                        arrow_forward
                    </span>
</a>
</div>
</div>
<!-- Bottom Anchor Line (Decorative) -->
<div class="mt-8 w-1/3 h-1 bg-surface-container-highest rounded-full md:hidden"></div>
</main>
<!-- Background Decorative Gradient (The "Electric Pulse" hint) -->
<div class="fixed -bottom-[20%] -left-[10%] w-[60%] h-[60%] bg-secondary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed -top-[10%] -right-[10%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
